# Install location: ~/.tmux.conf

# Core Behavior and True Color 
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s escape-time 0                             
set -g focus-events on                           
set -g mouse on                                  
set -g base-index 1                              
setw -g pane-base-index 1                        

# Key Bindings
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind r source-file ~/.tmux.conf \; display "Config reloaded"

# WSL 2 Clipboard Integration (Stable)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

# Plugin Management and Theming
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Theme Configuration 
set -g @catppuccin_flavour 'mocha' 
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# State Persistence 
set -g @continuum-restore 'on'                 
set -g @continuum-save-interval '15'           
set -g @resurrect-capture-pane-contents 'on'   
set -g @resurrect-processes 'nvim node "npm run dev"' 

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
